services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/travel-medicine-advisory
      REDIS_HOST: redis
      APP_STORAGE_PATH: /app/storage/upload
      APP_STORAGE_BASE_URL: http://localhost:8080/storage/upload
      # Vertex (optional): on GCP you normally omit GOOGLE_APPLICATION_CREDENTIALS and use an attached SA.
      # For Compose on your laptop, create ./secrets/gcp-sa.json (gitignored), then uncomment below + secrets block.
      # GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/gcp_sa
      # VERTEX_PROJECT_ID: your-gcp-project-id
    volumes:
      - app-storage:/app/storage/upload
    # secrets:
    #   - gcp_sa
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: travel-medicine-advisory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  app-storage:

# Uncomment with the app service secrets + env above:
# secrets:
#   gcp_sa:
#     file: ./secrets/gcp-sa.json
