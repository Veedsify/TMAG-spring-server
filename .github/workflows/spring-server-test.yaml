name: Spring Server Tests

on:
    push:
        branches: [updates]
        paths:
            - "src/**"
            - "pom.xml"
            - ".github/workflows/spring-server-test.yaml"
    pull_request:
        branches: [updates, feature-updates]
        paths:
            - "src/**"
            - "pom.xml"
            - ".github/workflows/spring-server-test.yaml"

jobs:
    test:
        runs-on: ubuntu-latest

        services:
            postgres:
                image: postgres:16
                env:
                    POSTGRES_DB: travel-medicine-advisory
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: postgres
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd="pg_isready -U postgres"
                    --health-interval=10s
                    --health-timeout=5s
                    --health-retries=5

            redis:
                image: redis:7
                ports:
                    - 6379:6379
                options: >-
                    --health-cmd="redis-cli ping"
                    --health-interval=10s
                    --health-timeout=5s
                    --health-retries=5

        steps:
            - uses: actions/checkout@v4

            - name: Set up JDK 25
              uses: actions/setup-java@v4
              with:
                  java-version: "25"
                  distribution: temurin
                  cache: maven
                  cache-dependency-path: pom.xml

            - name: Create .env file
              run: |
                  cat > .env <<EOF
                  APP_ENV=debug
                  SERVER_PORT=8080
                  APP_FRONTEND_URL=http://localhost:3000
                  APP_HOST=http://localhost:8080
                  APP_WEBSOCKET_ALLOWED_ORIGINS=http://localhost:3000
                  APP_CORS_ALLOWED_ORIGINS=
                  SPRING_DATASOURCE_URL=jdbc:postgresql://localhost:5432/travel-medicine-advisory
                  SPRING_DATASOURCE_USERNAME=postgres
                  SPRING_DATASOURCE_PASSWORD=postgres
                  SPRING_JPA_HIBERNATE_DDL_AUTO=create-drop
                  SPRING_JPA_SHOW_SQL=true
                  SPRING_JPA_FORMAT_SQL=true
                  SPRING_FLYWAY_ENABLED=true
                  SPRING_FLYWAY_BASELINE_ON_MIGRATE=true
                  SPRING_FLYWAY_BASELINE_VERSION=0
                  SPRING_FLYWAY_LOCATIONS=classpath:db/migration
                  SPRING_FLYWAY_VALIDATE_ON_MIGRATE=true
                  SPRING_FLYWAY_SCHEMAS=public
                  JWT_SECRET=test-jwt-secret-key-for-ci-only-32chars!
                  APP_API_KEY=test-api-key
                  APP_EMAIL_FROM_ADDRESS=noreply@travelmedicine.global
                  SPRING_MAIL_HOST=localhost
                  SPRING_MAIL_PORT=1025
                  SPRING_MAIL_USERNAME=
                  SPRING_MAIL_PASSWORD=
                  SPRING_MAIL_SMTP_AUTH=false
                  SPRING_MAIL_SMTP_STARTTLS_ENABLE=false
                  SPRING_MAIL_TEST_CONNECTION=false
                  REDIS_HOST=localhost
                  REDIS_PORT=6379
                  REDIS_PASSWORD=
                  APP_STORAGE_PROVIDER=gcs
                  APP_STORAGE_PATH=storage/upload
                  APP_STORAGE_BASE_URL=http://localhost:8080/storage/upload
                  APP_STORAGE_MAX_SIZE=26214400
                  APP_STORAGE_ALLOWED_EXTENSIONS=.jpg,.jpeg,.png,.gif,.pdf,.doc,.docx,.txt,.zip
                  APP_STORAGE_MAX_FILE_SIZE=25MB
                  APP_STORAGE_MAX_REQUEST_SIZE=30MB
                  APP_STORAGE_GCS_BUCKET=tmag-storage-bucket
                  APP_STORAGE_GCS_PROJECT_ID=
                  APP_STORAGE_S3_BUCKET=
                  APP_STORAGE_S3_REGION=
                  APP_STORAGE_S3_ACCESS_KEY=
                  APP_STORAGE_S3_SECRET_KEY=
                  APP_STORAGE_S3_ENDPOINT=
                  FLUTTERWAVE_PUBLIC_KEY=
                  FLUTTERWAVE_SECRET_KEY=
                  FLUTTERWAVE_ENCRYPTION_KEY=
                  FLUTTERWAVE_CALLBACK_URL=http://localhost:3000/payment/callback
                  FLUTTERWAVE_WEBHOOK_URL=http://localhost:8080/api/v1/payments/webhook/flutterwave
                  GOOGLE_APPLICATION_CREDENTIALS=
                  GOOGLE_CLIENT_ID=
                  GOOGLE_CLIENT_SECRET=
                  GOOGLE_REDIRECT_URI=
                  APP_AI_PROVIDER=anthropic
                  APP_AI_MAIN_PROVIDER=anthropic
                  APP_AI_STANDARD_PREMIUM_PROVIDER=anthropic
                  APP_AI_FREE_PROVIDER=anthropic
                  APP_AI_SUMMARY_PROVIDER=vertex
                  APP_AI_DEFAULT_MODEL=claude-sonnet-4-6
                  APP_AI_MAIN_MODEL=claude-sonnet-4-6
                  APP_AI_SUMMARY_MODEL=claude-haiku-4-5
                  APP_AI_FREE_MODEL=claude-haiku-4-5
                  APP_AI_STANDARD_PREMIUM_MODEL=claude-sonnet-4-6
                  APP_AI_MAX_OUTPUT_TOKENS=8192
                  APP_AI_SUMMARY_MAX_OUTPUT_TOKENS=2048
                  VERTEX_PROJECT_ID=
                  VERTEX_CREDENTIALS_PATH=
                  VERTEX_LOCATION=global
                  VERTEX_MODEL=gemini-3.1-pro-preview
                  OPENAI_API_KEY=
                  OPENAI_MODEL=gpt-4.1
                  OPENAI_BASE_URL=https://api.openai.com/v1/
                  ANTHROPIC_API_KEY=
                  ANTHROPIC_MODEL=claude-sonnet-4-5-20250929
                  ANTHROPIC_BASE_URL=https://api.anthropic.com/v1/
                  APP_LOGGING_ERROR_FILE_ENABLED=false
                  APP_LOGGING_ERROR_FILE_PATH=logs/error.log
                  APP_LOGGING_ERROR_FILE_MAX_SIZE=10MB
                  APP_LOGGING_ERROR_FILE_MAX_HISTORY=14
                  EOF

            - name: Compile
              run: mvn compile -B

            - name: Run tests
              run: mvn test -B

            - name: Upload test results
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: test-results
                  path: target/surefire-reports/
                  retention-days: 7
