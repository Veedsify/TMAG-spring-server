# =============================================================================
# APPLICATION SETTINGS
# =============================================================================
spring.application.name=TravelMedicineAdvisoryServer
app.version=1.0.0
app.frontend.url=${APP_FRONTEND_URL:http://localhost:3000}
app.env=${APP_ENV:debug}
app.admin.email=${APP_ADMIN_EMAIL:hello@tmag.health}
app.admin.superadmin-email=${SUPERADMIN_EMAIL:hello@tmag.health}
# Options: debug, development, production

# =============================================================================
# SERVER CONFIGURATION
# =============================================================================
server.port=${SERVER_PORT:8080}
app.host=${APP_HOST:http://localhost:8080}

# =============================================================================
# DATABASE CONFIGURATION (Spring Data JPA)
# =============================================================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/travel-medicine-advisory}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:1234}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:create-drop}
# Flyway 11.7.2 does not support PostgreSQL 18 — disabled in favour of Hibernate DDL
spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:false}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_FORMAT_SQL:true}
# Flyway configuration
spring.flyway.baseline-on-migrate=${SPRING_FLYWAY_BASELINE_ON_MIGRATE:true}
spring.flyway.baseline-version=${SPRING_FLYWAY_BASELINE_VERSION:0}

# =============================================================================
# CORS CONFIGURATION
# =============================================================================
app.cors.enabled=true
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001,http://localhost:5173,http://localhost:3002}
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH,HEAD
app.cors.allowed-headers=Origin,Content-Type,Accept,Authorization,X-Api-Key,Base-Orgid
app.cors.expose-headers=Content-Length,Content-Type
app.cors.allow-credentials=true
app.cors.max-age=43200

# =============================================================================
# SECURITY / JWT CONFIGURATION
# =============================================================================
jwt.secret=${JWT_SECRET:26aeb674-1ae8-11f1-b69e-2b73bbf41615}
jwt.expiration=86400000
app.api-key=${APP_API_KEY:26aeb674-1ae8-11f1-b69e-2b73bbf41615}

# =============================================================================
# GOOGLE OAUTH CONFIGURATION
# =============================================================================
google.client-id=${GOOGLE_CLIENT_ID}
google.client-secret=${GOOGLE_CLIENT_SECRET}
google.redirect-uri=${GOOGLE_REDIRECT_URI}

# =============================================================================
# MIDDLEWARE CONFIGURATION
# =============================================================================
app.middleware.api-key.enabled=true
app.middleware.api-key.skip-paths=/health,/,/swagger-ui/**,/v3/api-docs/**
app.middleware.auth.enabled=true
app.middleware.auth.skip-paths=/api/v1/auth/**,/api/v1/public/**,/ws/**,/swagger-ui/**,/v3/api-docs/**
app.middleware.rate-limit.enabled=true
app.middleware.rate-limit.requests=60
app.middleware.rate-limit.window=1m
app.middleware.rate-limit.skip-paths=/health,/
app.middleware.logging.enabled=true
app.middleware.recovery.enabled=true
app.middleware.cors.enabled=true

# =============================================================================
# OPENAPI / SWAGGER (springdoc)
# =============================================================================
springdoc.api-docs.enabled=${app.features.swagger.enabled:true}
springdoc.swagger-ui.enabled=${app.features.swagger.enabled:true}
springdoc.swagger-ui.path=/swagger-ui
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.show-actuator=false

# =============================================================================
# FEATURE TOGGLES
# =============================================================================
app.features.swagger.enabled=true
app.features.websocket.enabled=true
app.features.seeder.enabled=true

# =============================================================================
# EMAIL CONFIGURATION
# =============================================================================
app.email.provider=smtp
# Options: smtp, sendgrid, postmark
app.email.from-address=noreply@travelmedicine.global

# SMTP (default)
spring.mail.host=${SPRING_MAIL_HOST}
spring.mail.port=${SPRING_MAIL_PORT}
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}
spring.mail.test-connection=${SPRING_MAIL_TEST_CONNECTION:true}

# SendGrid (uncomment if app.email.provider=sendgrid)
#app.email.sendgrid.api-key=${SENDGRID_API_KEY:your_sendgrid_api_key}

# Postmark (uncomment if app.email.provider=postmark)
#app.email.postmark.server-token=${POSTMARK_SERVER_TOKEN:your_postmark_server_token}
#app.email.postmark.account-token=${POSTMARK_ACCOUNT_TOKEN:your_postmark_account_token}

# =============================================================================
# STORAGE CONFIGURATION
# =============================================================================
app.storage.provider=local
# Options: local, s3, r2
app.storage.path=${APP_STORAGE_PATH:storage/upload}
app.storage.base-url=${APP_STORAGE_BASE_URL:http://localhost:8080/storage/upload}
app.storage.max-size=10485760
app.storage.allowed-extensions=.jpg,.jpeg,.png,.gif,.pdf,.doc,.docx,.txt,.zip

# GCS (uncomment if app.storage.provider=gcs)
app.storage.gcs.bucket=${APP_STORAGE_GCS_BUCKET:}
app.storage.gcs.project-id=${APP_STORAGE_GCS_PROJECT_ID:}

# S3/R2/MinIO (set app.storage.provider=s3)
app.storage.s3.bucket=${APP_STORAGE_S3_BUCKET:}
app.storage.s3.region=${APP_STORAGE_S3_REGION:us-east-2}
app.storage.s3.access-key=${APP_STORAGE_S3_ACCESS_KEY:}
app.storage.s3.secret-key=${APP_STORAGE_S3_SECRET_KEY:}
# Optional: override endpoint for R2/MinIO (e.g. https://account.r2.cloudflarestorage.com)
app.storage.s3.endpoint=${APP_STORAGE_S3_ENDPOINT:}

# =============================================================================
# CACHE CONFIGURATION
# =============================================================================
app.cache.enabled=true
app.cache.provider=redis
# Options: memory, redis, none
app.cache.default-ttl=2m
spring.cache.type=redis

# Redis (uncomment if app.cache.provider=redis)
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.repositories.enabled=false
spring.data.redis.password=${REDIS_PASSWORD:}
#spring.data.redis.database=${REDIS_DATABASE:0}

# =============================================================================
# LOGGING CONFIGURATION
# =============================================================================
logging.level.root=INFO
logging.level.com.TravelMedicineAdvisory=DEBUG
logging.level.org.hibernate.SQL=DEBUG
# logging.file.name=logs/application.log

# =============================================================================
# WEBSOCKET CONFIGURATION
# =============================================================================
app.websocket.allowed-origins=${APP_WEBSOCKET_ALLOWED_ORIGINS}

# =============================================================================
# QUEUE CONFIGURATION
# =============================================================================
app.queue.enabled=true
app.queue.worker.interval-ms=5000
app.queue.worker.batch-size=10

# =============================================================================
# AI GENERATION CONFIGURATION
# =============================================================================
app.ai.provider=${APP_AI_PROVIDER:vertex}
# Must match a Vertex publisher model id (see cloud.google.com/vertex-ai/generative-ai/docs/learn/model-versions)
app.ai.default-model=${APP_AI_DEFAULT_MODEL:gemini-2.5-pro}
app.ai.temperature=${APP_AI_TEMPERATURE:0.2}
app.ai.max-output-tokens=${APP_AI_MAX_OUTPUT_TOKENS:8192}


# Vertex: set VERTEX_PROJECT_ID. Auth — if not on GCP metadata, use ONE of:
#   • export GOOGLE_APPLICATION_CREDENTIALS=/absolute/path/to/service-account.json
#   • or app.ai.vertex.credentials-path below (same JSON file; takes precedence if both set)
#   • or: gcloud auth application-default login
#
# Model id vs marketing name: Gemini 3.1 Pro on Vertex is gemini-3.1-pro-preview and is only on the global endpoint
# (VERTEX_LOCATION=global). Regional models (e.g. gemini-2.5-pro) use VERTEX_LOCATION=us-central1 (or another region).
app.ai.vertex.project-id=${VERTEX_PROJECT_ID:}
app.ai.vertex.location=${VERTEX_LOCATION:us-central1}
app.ai.vertex.model=${VERTEX_MODEL:gemini-3.1-pro-preview}
app.ai.vertex.credentials-path=${VERTEX_CREDENTIALS_PATH:}

# OpenAI (optional provider)
app.ai.openai.api-key=${OPENAI_API_KEY:}
app.ai.openai.model=${OPENAI_MODEL:gpt-4.1}
app.ai.openai.base-url=${OPENAI_BASE_URL:https://api.openai.com/v1}

# Anthropic Claude (optional provider)
app.ai.anthropic.api-key=${ANTHROPIC_API_KEY:}
app.ai.anthropic.model=${ANTHROPIC_MODEL:claude-sonnet-4-0}
app.ai.anthropic.base-url=${ANTHROPIC_BASE_URL:https://api.anthropic.com/v1}

# =============================================================================
# PRODUCTION OVERRIDES
# =============================================================================
# For production deployments, consider:
# app.env=production
# app.features.swagger.enabled=false
# logging.level.root=WARN
# app.storage.provider=s3
# jwt.secret=${JWT_SECRET_PROD:your_super_secure_production_secret}
# app.api-key=${APP_API_KEY_PROD:your_secure_production_api_key}

# =============================================================================
# FLUTTERWAVE PAYMENT CONFIGURATION
# =============================================================================
app.payment.provider=flutterwave
# Options: flutterwave, paystack
app.payment.flutterwave.public-key=${FLUTTERWAVE_PUBLIC_KEY}
app.payment.flutterwave.secret-key=${FLUTTERWAVE_SECRET_KEY}
app.payment.flutterwave.encryption-key=${FLUTTERWAVE_ENCRYPTION_KEY}
app.payment.flutterwave.webhook-url=${FLUTTERWAVE_WEBHOOK_URL:http://localhost:8080/api/v1/payments/webhook/flutterwave}
app.payment.flutterwave.webhook-secret-hash=${FLUTTERWAVE_WEBHOOK_SECRET_HASH:}
app.payment.flutterwave.timeout=30s

# Paystack (alternative - uncomment if app.payment.provider=paystack)
#app.payment.paystack.public-key=${PAYSTACK_PUBLIC_KEY:}
#app.payment.paystack.secret-key=${PAYSTACK_SECRET_KEY:}
#app.payment.paystack.callback-url=${PAYSTACK_CALLBACK_URL:http://localhost:3000/payment/callback}
# TomCat Thread Configs
server.tomcat.threads.max=400
server.tomcat.threads.min-spare=50
spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.minimum-idle=10

# Jackson — serialize LocalDateTime as ISO-8601 strings (registers JavaTimeModule)
spring.jackson.serialization.write-dates-as-timestamps=false
