# =============================================================================
# APPLICATION SETTINGS
# =============================================================================
spring.application.name=TravelMedicineAdvisoryServer
app.version=1.0.0
app.frontend.url=http://localhost:3000
app.env=debug
# Options: debug, development, production

# =============================================================================
# SERVER CONFIGURATION
# =============================================================================
server.port=8080
app.host=http://localhost:8080

# =============================================================================
# DATABASE CONFIGURATION (Spring Data JPA)
# =============================================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/travel-medicine-advisory
spring.datasource.username=postgres
spring.datasource.password=1234
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# =============================================================================
# CORS CONFIGURATION
# =============================================================================
app.cors.enabled=true
app.cors.allowed-origins=http://localhost:3000,http://localhost:3001
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH,HEAD
app.cors.allowed-headers=Origin,Content-Type,Accept,Authorization,X-Api-Key,Base-Orgid
app.cors.expose-headers=Content-Length,Content-Type
app.cors.allow-credentials=true
app.cors.max-age=43200

# =============================================================================
# SECURITY / JWT CONFIGURATION
# =============================================================================
jwt.secret=26aeb674-1ae8-11f1-b69e-2b73bbf41615
jwt.expiration=86400000
app.api-key=26aeb674-1ae8-11f1-b69e-2b73bbf41615

# =============================================================================
# MIDDLEWARE CONFIGURATION
# =============================================================================
app.middleware.api-key.enabled=true
app.middleware.api-key.skip-paths=/health,/,/swagger-ui,/v3/api-docs
app.middleware.auth.enabled=true
app.middleware.auth.skip-paths=/api/v1/auth/**,/api/v1/public/**,/ws/**,/swagger-ui/**,/v3/api-docs/**
app.middleware.rate-limit.enabled=true
app.middleware.rate-limit.requests=60
app.middleware.rate-limit.window=1m
app.middleware.rate-limit.skip-paths=/health,/
app.middleware.logging.enabled=true
app.middleware.recovery.enabled=true
app.middleware.cors.enabled=true

# =============================================================================
# FEATURE TOGGLES
# =============================================================================
app.features.swagger.enabled=true
app.features.websocket.enabled=true
app.features.seeder.enabled=true

# =============================================================================
# EMAIL CONFIGURATION
# =============================================================================
app.email.provider=smtp
# Options: smtp, sendgrid, postmark
app.email.from-address=noreply@yourdomain.com

# SMTP (default)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=dikewisdom778@gmail.com
spring.mail.password=cybzfnslbyjzfzvd
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=false

# SendGrid (uncomment if app.email.provider=sendgrid)
#app.email.sendgrid.api-key=your_sendgrid_api_key

# Postmark (uncomment if app.email.provider=postmark)
#app.email.postmark.server-token=your_postmark_server_token
#app.email.postmark.account-token=your_postmark_account_token

# =============================================================================
# STORAGE CONFIGURATION
# =============================================================================
app.storage.provider=local
# Options: local, s3, r2
app.storage.path=storage/upload
app.storage.base-url=http://localhost:8080/storage/upload
app.storage.max-size=10485760
app.storage.allowed-extensions=.jpg,.jpeg,.png,.gif,.pdf,.doc,.docx,.txt,.zip

# S3/R2 (uncomment if app.storage.provider=s3 or r2)
#app.storage.api-key=your_storage_api_key
#app.storage.api-secret=your_storage_api_secret
#app.storage.endpoint=https://your-endpoint.com
#app.storage.region=auto
#app.storage.bucket=your-bucket-name
#app.storage.public-url=https://your-cdn.com

# =============================================================================
# CACHE CONFIGURATION
# =============================================================================
app.cache.enabled=true
app.cache.provider=memory
# Options: memory, redis, none
app.cache.default-ttl=15m

# Redis (uncomment if app.cache.provider=redis)
spring.data.redis.host=localhost
spring.data.redis.port=6379
#spring.data.redis.password=
#spring.data.redis.database=0

# =============================================================================
# LOGGING CONFIGURATION
# =============================================================================
logging.level.root=INFO
logging.level.com.TravelMedicineAdvisory=DEBUG
logging.level.org.hibernate.SQL=DEBUG
# logging.file.name=logs/application.log

# =============================================================================
# WEBSOCKET CONFIGURATION
# =============================================================================
app.websocket.allowed-origins=http://localhost:3000,http://localhost:3001

